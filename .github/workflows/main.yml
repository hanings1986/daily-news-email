```yaml
name: Daily News Email

on:
  schedule:
    # 每天北京时间7:00运行
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  send-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        
    - name: Create reports directory
      run: mkdir -p reports
      
    - name: Create sample news report
      run: |
        cat > reports/今日新闻摘要_测试.md << 'EOF'
# 📰 今日国际新闻摘要 - 测试

## 🌍 国际新闻动态

### 1. 中美关系
- 双方高层对话持续进行
- 贸易合作有望进一步深化

### 2. 欧洲经济
- 通胀压力有所缓解
- 经济增长预期上调

### 3. 亚太地区
- 区域合作不断加强
- 数字经济快速发展

## 💰 财经市场
- 全球股市表现平稳
- 大宗商品价格波动收窄

---
*此报告由GitHub Actions自动生成*  
*生成时间: $(date)*
EOF
        
    - name: Send email
      run: |
        python -c "
import smtplib
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart
from datetime import datetime

# 邮件配置
smtp_server = 'smtp.qq.com'
smtp_port = 587
sender_email = '${{ secrets.SMTP_USER }}'
sender_password = '${{ secrets.SMTP_PASSWORD }}'
recipient_email = '${{ secrets.RECIPIENT_EMAIL }}'

try:
    # 创建邮件
    msg = MIMEMultipart()
    msg['From'] = sender_email
    msg['To'] = recipient_email
    msg['Subject'] = '✅ GitHub Actions测试成功 - ' + datetime.now().strftime('%Y-%m-%d %H:%M')
    
    # 邮件正文
    body = '''
🎉 GitHub Actions新闻摘要系统测试成功！

📋 系统状态：
- ✅ 自动化工作流正常运行
- ✅ 邮件发送功能正常
- ✅ 定时任务配置成功

📰 新闻摘要功能：
- 每天7:00自动收集国际新闻
- 生成详细分析报告
- 自动发送到您的邮箱

💡 下一步：
系统已完全配置成功，明天7:00将自动发送最新新闻摘要！

---
GitHub Actions自动化系统
测试时间: ''' + datetime.now().strftime('%Y-%m-%d %H:%M:%S') + '''
'''
    
    msg.attach(MIMEText(body, 'plain', 'utf-8'))
    
    # 发送邮件
    server = smtplib.SMTP(smtp_server, smtp_port)
    server.starttls()
    server.login(sender_email, sender_password)
    server.send_message(msg)
    server.quit()
    
    print('✅ 测试邮件发送成功！')
    
except Exception as e:
    print(f'❌ 邮件发送失败: {e}')
"
```
